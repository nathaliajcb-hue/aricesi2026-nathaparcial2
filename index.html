<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; template</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- <model-viewer> HTML element -->
    <model-viewer src="Serum Andrea Ospina Blender.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1">
      <button class="Hotspot" slot="hotspot-3" data-position="0.3188145533147115m 0.3600195259495088m -0.006630427611267677m" data-normal="0.5836998469516597m 0.000022794365510391053m 0.8119695118346663m" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">Serum para Cejas y Pestañas</div>
      </button><button class="Hotspot" slot="hotspot-4" data-position="0.3532592674778244m 0.021015889845317104m 0.0018477398062610867m" data-normal="0.7377141838708945m 0.0020566632890843275m 0.6751100303297347m" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">Fortalece, hidrata y nutre.</div>
      </button><button class="Hotspot" slot="hotspot-6" data-position="0.3408606576993727m 0.18874320722794435m 0.014112095893131352m" data-normal="0.6177213343027722m -0.002506813471553931m 0.7863930753976801m" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">Hecho con ingredientes naturales.</div>
      </button>
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
      <button slot="ar-button" id="ar-button">
          View in your space
      </button>
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  </body>
</html>
